<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>50 Design Styles — Explorer</title>
<style>
  /* ---------- Tokens ---------- */
  :root{
    --bg:#faf9f6;
    --surface:#ffffff;
    --surface-soft:#f4f0e6;
    --ink:#141414;
    --ink-soft:#3b3b3b;
    --muted:#7a7974;
    --line:#e7e2d5;
    --line-soft:#f0ece0;
    --chip:#f2ede1;
    --chip-ink:#2a2a2a;
    --chip-active:#141414;
    --chip-active-ink:#faf9f6;
    --accent:#141414;
    --focus:#2563eb;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 6px 18px rgba(0,0,0,.06);
    --shadow-lg:0 30px 80px rgba(0,0,0,.25);
    --radius-sm:8px;
    --radius-md:12px;
    --radius-lg:16px;
    --pad-gut:32px;
    --ease:cubic-bezier(.2,.7,.2,1);
    --serif:"Playfair Display","Didot","Cormorant Garamond",Georgia,serif;
    --sans:"Inter","Helvetica Neue",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  /* The HTML [hidden] attribute must always win over any display:* rules below. */
  [hidden]{display:none!important}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font:inherit;cursor:pointer;border:0;background:none;color:inherit;padding:0}
  input{font:inherit}
  *:focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:6px}

  /* ---------- Header ---------- */
  header{padding:28px var(--pad-gut) 18px}
  .title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
  h1{font-family:var(--serif);font-weight:500;font-size:40px;line-height:1.05;letter-spacing:-.01em;margin:0}
  .lede{color:var(--muted);font-size:13.5px;max-width:680px;margin:6px 0 0}
  .lede a{color:var(--ink-soft);text-decoration:underline;text-underline-offset:3px;text-decoration-color:#cfc8b4;transition:color .15s ease, text-decoration-color .15s ease}
  .lede a:hover{color:var(--ink);text-decoration-color:var(--ink)}
  .stats{color:var(--muted);font-size:12px;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}

  /* ---------- Sticky chrome (toolbar + filter panel + active bar) ---------- */
  .sticky-zone{position:sticky;top:0;z-index:8;background:var(--bg);box-shadow:0 8px 18px -18px rgba(0,0,0,.18)}
  .toolbar{background:var(--bg);border-top:1px solid var(--line);border-bottom:1px solid var(--line);
           display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:10px var(--pad-gut)}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:13.5px;transition:border-color .15s ease,background .15s ease, transform .15s ease}
  .btn:hover{border-color:#c8c3b4}
  .btn:active{transform:scale(.985)}
  .btn .badge{display:inline-grid;place-items:center;min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:var(--ink);color:var(--bg);font-size:11px;font-weight:600}
  .btn .chev{display:inline-flex;align-items:center;color:var(--muted);transition:transform .25s var(--ease)}
  .btn .chev svg{width:14px;height:14px;display:block}
  .btn.open .chev{transform:rotate(180deg)}

  .search-wrap{position:relative;min-width:0}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted);pointer-events:none}
  .search{width:100%;height:38px;border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:0 40px 0 34px;font-size:13.5px;color:var(--ink);transition:border-color .15s ease}
  .search:hover{border-color:#c8c3b4}
  .search:focus{outline:none;border-color:var(--ink)}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:var(--surface-soft);display:none;place-items:center;color:var(--muted);font-size:13px}
  .search-clear.show{display:grid}
  .search-clear:hover{color:var(--ink)}

  /* ---------- Filter panel ---------- */
  .filter-panel{overflow:hidden;transition:grid-template-rows .3s var(--ease);display:grid;grid-template-rows:1fr;background:var(--bg);border-bottom:1px solid var(--line)}
  .filter-panel.collapsed{grid-template-rows:0fr;border-bottom-color:transparent}
  .filter-panel > .inner{min-height:0;padding:16px var(--pad-gut) 14px}
  /* Apply scroll/max-height only when expanded; when collapsed, .inner must collapse to 0 height. */
  .filter-panel:not(.collapsed) > .inner{max-height:62vh;overflow:auto;overscroll-behavior:contain}
  .filter-panel.collapsed > .inner{padding-top:0;padding-bottom:0;visibility:hidden}

  .filter-row{display:grid;grid-template-columns:150px 1fr;gap:18px;padding:10px 0;border-top:1px dashed var(--line-soft)}
  .filter-row:first-child{border-top:0}
  .filter-label{display:flex;flex-direction:column;gap:2px;padding-top:6px}
  .filter-label .name{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .filter-label .hint{font-size:11px;color:#b4ae9d}
  .chips{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border:1px solid var(--line);background:var(--chip);color:var(--chip-ink);
        border-radius:999px;font-size:12.5px;transition:background .15s ease,color .15s ease,border-color .15s ease,transform .15s ease,opacity .15s ease;white-space:nowrap}
  .chip:hover{border-color:#b9b3a1}
  .chip .cnt{color:var(--muted);font-size:10.5px;font-variant-numeric:tabular-nums}
  .chip.active{background:var(--chip-active);color:var(--chip-active-ink);border-color:var(--chip-active)}
  .chip.active .cnt{color:rgba(250,249,246,.75)}
  .chip.dim{opacity:.35}
  /* Default: chips beyond the initial row are hidden. When the row is .expanded, show them. */
  .filter-row .chip.over-limit{display:none}
  .filter-row.expanded .chip.over-limit{display:inline-flex}
  /* Search filter overrides everything: hide non-matching chips regardless of expand state. */
  .filter-row .chip.search-hide{display:none!important}
  .show-more{border:0;background:transparent;color:var(--muted);font-size:12px;padding:5px 8px;border-radius:999px;text-decoration:underline;text-underline-offset:3px;text-decoration-color:#d9d3c1}
  .show-more:hover{color:var(--ink);text-decoration-color:var(--ink)}
  .show-more.is-hidden{display:none}

  /* ---------- Active bar ---------- */
  .active-bar{display:flex;align-items:center;gap:10px;padding:10px var(--pad-gut);min-height:46px;background:var(--bg);border-bottom:1px solid var(--line);flex-wrap:wrap}
  .active-bar .label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-right:4px}
  .active-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:var(--ink);color:var(--bg);font-size:12px}
  .active-chip .x{opacity:.7}
  .active-chip:hover .x{opacity:1}
  .clear-all{margin-left:auto;font-size:12px;color:var(--muted);border:1px solid var(--line);padding:4px 10px;border-radius:999px;background:var(--bg)}
  .clear-all:hover{color:var(--ink);border-color:var(--ink)}

  /* ---------- Grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;padding:22px var(--pad-gut) 80px}
  .card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s var(--ease), box-shadow .2s ease, border-color .15s ease, opacity .25s ease;animation:fadeIn .4s var(--ease) both}
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:#d8d3c6}
  .card:active{transform:translateY(0)}
  .card .thumb{aspect-ratio:3/4;background:#eee center/cover no-repeat;position:relative}
  .card .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom, transparent 55%, rgba(0,0,0,.35));opacity:0;transition:opacity .2s}
  .card:hover .thumb::after{opacity:1}
  .card .num{position:absolute;top:10px;left:12px;color:#fff;mix-blend-mode:difference;font-family:var(--serif);font-size:15px;letter-spacing:.05em}
  .card .body{padding:11px 13px 14px}
  .card h3{font-family:var(--serif);font-weight:500;font-size:18px;margin:0 0 2px;letter-spacing:-.005em}
  .card .mini-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
  .card .mini-tag{font-size:10.5px;color:var(--muted);background:var(--surface-soft);border:1px solid var(--line-soft);border-radius:999px;padding:2px 8px;letter-spacing:.01em}
  .card.hidden{display:none}

  .empty{grid-column:1/-1;text-align:center;padding:80px 24px;color:var(--muted)}
  .empty h3{font-family:var(--serif);font-size:28px;color:var(--ink-soft);margin:0 0 8px;font-weight:500}
  .empty p{max-width:420px;margin:0 auto 16px}

  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ---------- Modal ---------- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,10,10,.55);backdrop-filter:blur(3px);display:none;z-index:50;animation:fadeIn .25s var(--ease)}
  .modal-backdrop.open{display:block}
  .modal{position:fixed;inset:4vh 5vw;background:var(--bg);border-radius:14px;overflow:hidden;display:none;z-index:51;box-shadow:var(--shadow-lg);animation:pop .35s var(--ease)}
  @keyframes pop{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}
  .modal.open{display:grid;grid-template-rows:auto minmax(0,1fr) auto}

  /* Cover: full uncut composite image at the top */
  .cover{margin:0;background:#0d0d0d;display:grid;place-items:center;padding:0}
  .cover img{display:block;width:100%;max-height:46vh;object-fit:contain;background:#0d0d0d}

  /* Body: two equal columns under the image */
  .modal-body{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:32px;padding:24px 32px 28px;overflow:auto;align-items:start}
  .modal-info{min-width:0}
  .modal-tags{min-width:0;border-left:1px solid var(--line);padding-left:24px}
  .num-line{font-family:var(--serif);color:var(--muted);font-size:11.5px;letter-spacing:.22em;text-transform:uppercase}
  .modal-info h2{font-family:var(--serif);font-weight:500;font-size:34px;line-height:1.08;margin:4px 0 10px;letter-spacing:-.01em}
  .desc{color:var(--ink-soft);font-size:14.5px;line-height:1.6;margin:0}

  /* External-reference links — small pill row beneath the description. */
  .refs{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
  .ref-link{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;
            background:var(--surface);border:1px solid var(--line);color:var(--ink-soft);
            text-decoration:none;font-size:12.5px;line-height:1.2;
            transition:border-color .15s ease, background .15s ease, transform .15s ease}
  .ref-link:hover{border-color:#b9b3a1;background:var(--surface-soft);color:var(--ink)}
  .ref-link:active{transform:scale(.97)}
  .ref-link svg{width:14px;height:14px;flex:0 0 14px}
  .ref-link .arrow{font-size:11px;color:var(--muted);margin-left:1px}
  .ref-link:hover .arrow{color:var(--ink)}

  /* Compact tag sections — color of the pills already distinguishes groups,
     so no dividers needed; tight vertical spacing keeps the section narrow. */
  .section{display:grid;grid-template-columns:118px 1fr;gap:12px;align-items:baseline;padding:3px 0}
  .section h4{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:5px 0 0;font-weight:600;white-space:nowrap}
  .pill-list{display:flex;flex-wrap:wrap;gap:4px}
  .pill{font-size:11.5px;line-height:1.2;padding:3px 8px;border-radius:999px;background:var(--chip);border:1px solid var(--line);cursor:pointer;transition:background .15s ease, border-color .15s ease, transform .15s ease;color:var(--chip-ink)}
  .pill:hover{border-color:#b3ac99}
  .pill:active{transform:scale(.96)}
  .pill.era{background:#ece8df}
  .pill.mood{background:#f4e7d3}
  .pill.elements{background:#e3ece2}
  .pill.usecase{background:#e9e5f2}
  .pill.core_terms{background:#f1ebdd}
  .pill.feels{background:#f8e9e0}
  .pill.fits{background:#e4ecf1}
  .modal .close{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.92);display:grid;place-items:center;color:#333;z-index:3;box-shadow:0 2px 8px rgba(0,0,0,.18)}
  .modal .close svg{width:16px;height:16px}
  .modal .close:hover{background:#fff}

  /* Bottom pager strip: prev arrow ← thumbnails → next arrow */
  .modal-pager{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:18px;align-items:center;
               padding:14px 28px;border-top:1px solid var(--line);background:var(--bg)}
  .modal-nav{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;
             border-radius:999px;background:transparent;color:var(--ink-soft);border:1px solid var(--line);
             cursor:pointer;transition:background .15s ease, color .15s ease, border-color .15s ease, transform .15s ease}
  .modal-nav svg{width:18px;height:18px}
  .modal-nav:hover{background:var(--surface);color:var(--ink);border-color:#b9b3a1}
  .modal-nav:active{transform:scale(.94)}
  .modal-nav[disabled]{opacity:.35;pointer-events:none}

  /* Center thumbs when they fit; fall back to start-alignment when they overflow,
     so horizontal scrolling still works for long filtered lists. */
  .pager-thumbs{display:flex;gap:6px;overflow-x:auto;scroll-behavior:smooth;
                justify-content:safe center;
                scrollbar-width:thin;scrollbar-color:#cfc8b4 transparent;padding:2px 4px}
  .pager-thumbs::-webkit-scrollbar{height:6px}
  .pager-thumbs::-webkit-scrollbar-thumb{background:#cfc8b4;border-radius:3px}
  .pager-thumbs::-webkit-scrollbar-track{background:transparent}
  .pager-thumb{flex:0 0 auto;width:32px;height:42px;border-radius:5px;border:1px solid var(--line);
               background:#eee center/cover no-repeat;cursor:pointer;padding:0;
               transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
               opacity:.55}
  .pager-thumb:hover{opacity:.9;border-color:#b9b3a1}
  .pager-thumb.current{opacity:1;border-color:var(--ink);box-shadow:0 0 0 2px var(--bg), 0 0 0 3px var(--ink);transform:scale(1.06)}

  @media (max-width: 900px){
    :root{--pad-gut:18px}
    h1{font-size:32px}
    .filter-row{grid-template-columns:1fr}
    .toolbar{grid-template-columns:auto 1fr;row-gap:8px}
    .stats{display:none}
    .modal{inset:0;border-radius:0}
    .modal.open{grid-template-rows:auto minmax(0,1fr) auto}
    .cover img{max-height:38vh}
    .modal-body{grid-template-columns:1fr;gap:18px;padding:18px 20px 22px}
    .modal-tags{border-left:0;padding-left:0;border-top:1px solid var(--line);padding-top:14px}
    .section{grid-template-columns:108px 1fr}
    .modal-pager{padding:10px 16px;gap:12px}
    .pager-thumb{width:26px;height:35px}
  }
  @media (prefers-reduced-motion: reduce){
    *,.card,.modal,.modal-backdrop,.filter-panel,.btn .chev{animation:none!important;transition-duration:.01ms!important}
  }
</style>
</head>
<body>
<header>
  <div class="title-row">
    <div>
      <h1>50 Design Styles</h1>
      <p class="lede">Filter the design vocabulary by era, mood, elements, or fine-grained keywords. Inspired by the <a href="https://uxplanet.org/50-design-styles-every-designer-should-know-for-better-prompting-56c09d55db62" target="_blank" rel="noopener noreferrer">UX&nbsp;Planet&nbsp;story</a>.</p>
    </div>
    <div class="stats"><span id="topcount">50 of 50</span> · <span id="topfilters">0 filters</span></div>
  </div>
</header>

<div class="sticky-zone">
  <div class="toolbar">
    <button class="btn open" id="toggle" aria-expanded="true" aria-controls="panel">
      <span>Filters</span>
      <span class="badge" id="fbadge" hidden>0</span>
      <span class="chev" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
      </span>
    </button>
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <circle cx="7" cy="7" r="5"/><line x1="11" y1="11" x2="14.5" y2="14.5"/>
      </svg>
      <input type="search" class="search" id="search" placeholder="Search tags — e.g. serif, dreamy, wellness…" aria-label="Search tags">
      <button class="search-clear" id="searchclear" aria-label="Clear search">×</button>
    </div>
    <div class="stats" id="topcount2">50 of 50</div>
  </div>

  <section class="filter-panel" id="panel" aria-labelledby="toggle"><div class="inner" id="panelInner"></div></section>

  <section class="active-bar" id="activebar" hidden>
    <span class="label">Active</span>
    <span id="activechips"></span>
    <button class="clear-all" id="clearall">Clear all</button>
  </section>
</div>

<section class="grid" id="grid"></section>

<div class="modal-backdrop" id="backdrop"></div>
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <button class="close" id="closeBtn" aria-label="Close">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 18 18 6M6 6l12 12"/></svg>
  </button>
  <figure class="cover" id="cover">
    <img id="coverImg" alt="">
  </figure>
  <div class="modal-body">
    <div class="modal-info" id="info"></div>
    <aside class="modal-tags" id="tags"></aside>
  </div>
  <nav class="modal-pager" id="pager" aria-label="Style navigation">
    <button class="modal-nav prev" id="navPrev" aria-label="Previous style">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.75 15.75 3 12m0 0 3.75-3.75M3 12h18"/></svg>
    </button>
    <div class="pager-thumbs" id="pagerThumbs" role="tablist"></div>
    <button class="modal-nav next" id="navNext" aria-label="Next style">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.25 8.25 21 12m0 0-3.75 3.75M21 12H3"/></svg>
    </button>
  </nav>

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const STYLES = DATA.styles;
const GROUPS = DATA.groups;
const LABELS = DATA.group_labels;
const TDIMS = DATA.token_dims;
const TFULL = DATA.token_full;
const INITIAL_ROW_LIMIT = 14;

const CURATED_DIMS = ['era','mood','elements','usecase'];
const TOKEN_DIMS = ['core_terms','feels','fits'];
const ALL_DIMS = [...CURATED_DIMS, ...TOKEN_DIMS];

const DIM_HINTS = {
  era:'periods & movements',
  mood:'emotional register',
  elements:'visual building blocks',
  usecase:'where it shines',
  core_terms:'specific motifs & materials',
  feels:'adjectives the article uses',
  fits:'contexts it suits',
};

const active = {}; ALL_DIMS.forEach(d=>active[d]=new Set());

/* ---------- Render filter panel ---------- */
const panelInner = document.getElementById('panelInner');
function renderFilterPanel(){
  panelInner.innerHTML = '';
  // Curated dims
  CURATED_DIMS.forEach(dim=>{
    const row = document.createElement('div');
    row.className='filter-row'; row.dataset.dim = dim;
    row.innerHTML = `<div class="filter-label"><div class="name">${LABELS[dim]}</div><div class="hint">${DIM_HINTS[dim]}</div></div><div class="chips"></div>`;
    panelInner.appendChild(row);
    const box = row.querySelector('.chips');
    const items = Object.entries(GROUPS[dim])
      .sort((a,b)=>b[1].length-a[1].length)
      .map(([tag, members])=>({tag, count: members.length}));
    renderChips(box, dim, items);
  });
  // Token dims
  TOKEN_DIMS.forEach(dim=>{
    const row = document.createElement('div');
    row.className='filter-row'; row.dataset.dim = dim;
    row.innerHTML = `<div class="filter-label"><div class="name">${TDIMS[dim].label}</div><div class="hint">${DIM_HINTS[dim]}</div></div><div class="chips"></div>`;
    panelInner.appendChild(row);
    const box = row.querySelector('.chips');
    const items = TDIMS[dim].items.map(([tag,count])=>({tag, count}));
    renderChips(box, dim, items);
  });
}
function renderChips(box, dim, items){
  const row = box.closest('.filter-row');
  items.forEach((it,i)=>{
    const chip = document.createElement('button');
    chip.className='chip';
    chip.dataset.dim = dim; chip.dataset.tag = it.tag;
    if(i>=INITIAL_ROW_LIMIT) chip.classList.add('over-limit');
    chip.innerHTML=`<span>${it.tag}</span><span class="cnt">${it.count}</span>`;
    chip.addEventListener('click',()=>toggleTag(dim, it.tag, chip));
    box.appendChild(chip);
  });
  if(items.length > INITIAL_ROW_LIMIT){
    const extra = items.length - INITIAL_ROW_LIMIT;
    const btn = document.createElement('button');
    btn.className='show-more';
    btn.type='button';
    btn.setAttribute('aria-expanded','false');
    btn.textContent=`+ ${extra} more`;
    btn.addEventListener('click',()=>{
      const expanded = row.classList.toggle('expanded');
      btn.setAttribute('aria-expanded', String(expanded));
      btn.textContent = expanded ? `– show fewer` : `+ ${extra} more`;
    });
    box.appendChild(btn);
  }
}
renderFilterPanel();

/* ---------- Filter toggle ---------- */
const toggleBtn = document.getElementById('toggle');
const panel = document.getElementById('panel');
toggleBtn.addEventListener('click',()=>{
  const open = !panel.classList.contains('collapsed');
  panel.classList.toggle('collapsed', open);
  toggleBtn.classList.toggle('open', !open);
  toggleBtn.setAttribute('aria-expanded', String(!open));
});

/* ---------- Search over chips ---------- */
const searchEl = document.getElementById('search');
const searchClear = document.getElementById('searchclear');
searchEl.addEventListener('input',()=>{
  const q = searchEl.value.trim().toLowerCase();
  searchClear.classList.toggle('show', q.length>0);
  document.querySelectorAll('.filter-row').forEach(row=>{
    let any = false;
    row.querySelectorAll('.chip').forEach(c=>{
      const tag = c.dataset.tag.toLowerCase();
      const matches = !q || tag.includes(q);
      // search-hide overrides over-limit so all matching chips become visible
      c.classList.toggle('search-hide', !matches);
      if(matches) any = true;
    });
    // Hide row entirely if no match
    row.style.display = (q && !any) ? 'none' : '';
    // While searching, force-expand the row so over-limit matches become visible,
    // and hide the show-more button (search already shows everything that matches).
    // When search is cleared, restore expand state based on the show-more button's own state.
    const sm = row.querySelector('.show-more');
    if(q){
      row.classList.add('expanded');
    } else if(sm){
      const userExpanded = sm.getAttribute('aria-expanded') === 'true';
      row.classList.toggle('expanded', userExpanded);
    }
    if(sm) sm.classList.toggle('is-hidden', !!q);
  });
  // If user searches with filter panel collapsed, auto-open it
  if(q && panel.classList.contains('collapsed')){ toggleBtn.click(); }
});
searchClear.addEventListener('click',()=>{ searchEl.value=''; searchEl.dispatchEvent(new Event('input')); searchEl.focus(); });

/* ---------- Core filter logic ---------- */
function matches(style){
  for(const dim of ALL_DIMS){
    const sel = active[dim];
    if(sel.size===0) continue;
    const terms = getStyleTerms(style, dim);
    const ok = [...sel].some(t=>terms.includes(t));
    if(!ok) return false;
  }
  return true;
}
function getStyleTerms(style, dim){
  if(dim==='era'||dim==='mood'||dim==='elements'||dim==='usecase') return style.tags[dim]||[];
  if(dim==='core_terms') return style.terms_core||[];
  if(dim==='feels')      return style.terms_feels||[];
  if(dim==='fits')       return style.terms_fits||[];
  return [];
}
function toggleTag(dim, tag, chipEl){
  if(active[dim].has(tag)){ active[dim].delete(tag); chipEl&&chipEl.classList.remove('active'); }
  else{ active[dim].add(tag); chipEl&&chipEl.classList.add('active'); }
  applyFilters();
}
function clearAll(){
  ALL_DIMS.forEach(d=>active[d].clear());
  document.querySelectorAll('.chip.active').forEach(c=>c.classList.remove('active'));
  applyFilters();
}
document.getElementById('clearall').addEventListener('click', clearAll);

/* ---------- Grid ---------- */
const gridEl = document.getElementById('grid');
STYLES.forEach(s=>{
  const card = document.createElement('article');
  card.className='card'; card.dataset.num = s.num;
  card.tabIndex = 0; card.setAttribute('role','button'); card.setAttribute('aria-label', `${s.name} — open details`);
  const preview = [...s.tags.mood, ...s.tags.era].slice(0,2);
  card.innerHTML = `
    <div class="thumb" style="background-image:url('${encodeURI(s.tiles[0])}')"><span class="num">${String(s.num).padStart(2,'0')}</span></div>
    <div class="body">
      <h3>${s.name}</h3>
      <div class="mini-tags">${preview.map(t=>`<span class="mini-tag">${t}</span>`).join('')}</div>
    </div>`;
  card.addEventListener('click',()=>openStyle(s));
  card.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openStyle(s); } });
  gridEl.appendChild(card);
});
const emptyEl = document.createElement('div');
emptyEl.className='empty'; emptyEl.innerHTML = `<h3>No styles match those filters.</h3><p>Try removing a filter or clearing them all.</p>`;
gridEl.appendChild(emptyEl);

function applyFilters(){
  let shown = 0;
  STYLES.forEach(s=>{
    const card = gridEl.querySelector(`.card[data-num="${s.num}"]`);
    if(matches(s)){ card.classList.remove('hidden'); shown++; }
    else card.classList.add('hidden');
  });
  emptyEl.style.display = shown===0 ? 'block':'none';
  document.getElementById('topcount').textContent = `${shown} of 50`;
  document.getElementById('topcount2').textContent = `${shown} of 50`;
  const fc = ALL_DIMS.reduce((a,d)=>a+active[d].size,0);
  document.getElementById('topfilters').textContent = fc === 1 ? `1 filter` : `${fc} filters`;
  const badge = document.getElementById('fbadge');
  badge.hidden = fc===0; badge.textContent = fc;
  renderActive();
  dimUnreachableChips();
}
function renderActive(){
  const bar = document.getElementById('activebar');
  const box = document.getElementById('activechips'); box.innerHTML = '';
  let total = 0;
  ALL_DIMS.forEach(dim=>{
    active[dim].forEach(tag=>{
      total++;
      const p = document.createElement('button'); p.className='active-chip';
      p.innerHTML = `<span>${tag}</span><span class="x">✕</span>`;
      p.addEventListener('click',()=>{
        active[dim].delete(tag);
        const src = document.querySelector(`.chip[data-dim="${dim}"][data-tag="${CSS.escape(tag)}"]`);
        if(src) src.classList.remove('active');
        applyFilters();
      });
      box.appendChild(p);
    });
  });
  bar.hidden = total===0;
}
function dimUnreachableChips(){
  // For each chip, tentatively add & see if anything matches; dim if not
  ALL_DIMS.forEach(dim=>{
    document.querySelectorAll(`.chip[data-dim="${dim}"]`).forEach(chip=>{
      const tag = chip.dataset.tag;
      if(active[dim].has(tag)){ chip.classList.remove('dim'); return; }
      const saved = active[dim]; const tmp = new Set(saved); tmp.add(tag);
      active[dim] = tmp;
      const any = STYLES.some(matches);
      active[dim] = saved;
      chip.classList.toggle('dim', !any);
    });
  });
}

/* ---------- Modal ---------- */
const modal = document.getElementById('modal');
const backdrop = document.getElementById('backdrop');
const coverImg = document.getElementById('coverImg');
const infoEl = document.getElementById('info');
const tagsEl = document.getElementById('tags');
const closeBtn = document.getElementById('closeBtn');
const navPrevBtn = document.getElementById('navPrev');
const navNextBtn = document.getElementById('navNext');
const pagerThumbsEl = document.getElementById('pagerThumbs');
let currentStyle = null, lastFocus = null;

/* Returns the currently visible (filtered) styles, in grid order. */
function navigableStyles(){
  return STYLES.filter(s=>{
    const card = gridEl.querySelector(`.card[data-num="${s.num}"]`);
    return card && !card.classList.contains('hidden');
  });
}

/* Move +1 / -1 within the filtered list (wraps). Called by buttons + keys. */
function navigateModal(delta){
  if(!currentStyle) return;
  const list = navigableStyles();
  if(list.length <= 1) return;
  const idx = list.findIndex(s => s.num === currentStyle.num);
  if(idx < 0) return;
  const next = list[(idx + delta + list.length) % list.length];
  openStyle(next, /*preserveFocus=*/true);
}

function openStyle(s, preserveFocus){
  currentStyle = s;
  if(!preserveFocus) lastFocus = document.activeElement;
  // Cover image: full uncut composite, falls back to the first tile if composite missing.
  // composite paths in the data are relative to the *parent* of the article folder
  // (e.g. ".../50 Design Styles ... files/foo.png"). Since this HTML lives INSIDE that
  // folder, take just the basename so the browser resolves it correctly.
  let cover = s.composite || (s.tiles && s.tiles[0]) || '';
  if (cover && !cover.startsWith('tiles/')) {
    const slash = cover.lastIndexOf('/');
    if (slash >= 0) cover = cover.slice(slash + 1);
  }
  coverImg.src = cover.includes('%') ? cover : encodeURI(cover);
  coverImg.alt = `${s.name} — example imagery`;

  // Left column: title + description + external reference links.
  // Use the style name (or its first part if it contains "/") for both lookups.
  const lookupName = s.name.split('/')[0].trim();
  const wikiURL  = `https://en.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(lookupName)}&go=Go`;
  const imagesURL = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(lookupName + ' visual style')}`;
  const wikiIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.5" aria-hidden="true"><path d="M2.5 12c0-4.478 0-6.718 1.391-8.109S7.521 2.5 12 2.5c4.478 0 6.718 0 8.109 1.391S21.5 7.521 21.5 12c0 4.478 0 6.718-1.391 8.109S16.479 21.5 12 21.5c-4.478 0-6.718 0-8.109-1.391S2.5 16.479 2.5 12Z"/><path stroke-linecap="round" d="M5 8h1.05m0 0H7m-.95 0l2.577 6.82C9.177 16.275 9.451 17 9.9 17c.45 0 .724-.726 1.273-2.18L13.75 8h.75m-5 0h.75l2.577 6.82c.55 1.454.824 2.18 1.273 2.18c.45 0 .724-.726 1.273-2.18L17.95 8m0 0H17m.95 0H19"/></svg>`;
  const imgIcon  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linejoin="round" stroke-width="1.5" aria-hidden="true"><path d="M12 12c2.761 0 5-2.257 5-5.042a5.04 5.04 0 0 0-3.052-4.645c-.702-.3-1.053-.45-1.5-.15S12 2.953 12 3.933zm0 0c-2.761 0-5 2.257-5 5.042a5.04 5.04 0 0 0 3.053 4.645c.701.3 1.052.45 1.5.15s.447-.79.447-1.77z"/><path d="M12 12c0 2.761 2.257 5 5.042 5a5.04 5.04 0 0 0 4.645-3.052c.3-.702.45-1.053.15-1.5s-.79-.448-1.77-.448zm0 0c0-2.761-2.257-5-5.042-5a5.04 5.04 0 0 0-4.645 3.053c-.3.701-.45 1.052-.15 1.5s.79.447 1.77.447z"/></svg>`;
  infoEl.innerHTML = `
    <div class="num-line">No. ${String(s.num).padStart(2,'0')}</div>
    <h2 id="modalTitle">${s.name}</h2>
    <p class="desc">${s.description}</p>
    <div class="refs">
      <a class="ref-link" href="${wikiURL}" target="_blank" rel="noopener noreferrer" aria-label="Open Wikipedia article for ${s.name}">${wikiIcon}<span>Wikipedia</span><span class="arrow" aria-hidden="true">↗</span></a>
      <a class="ref-link" href="${imagesURL}" target="_blank" rel="noopener noreferrer" aria-label="Search Google Images for ${s.name} visual style">${imgIcon}<span>Google Images</span><span class="arrow" aria-hidden="true">↗</span></a>
    </div>
  `;

  // Right column: compact tag sections, each row is "label | pills"
  const groups = tagsForStyle(s).filter(g => g.tags.length);
  tagsEl.innerHTML = groups.map(g =>
    `<div class="section"><h4>${g.label}</h4><div class="pill-list">${
      g.tags.map(t => `<button class="pill ${g.dim}" data-dim="${g.dim}" data-tag="${escapeAttr(t)}">${t}</button>`).join('')
    }</div></div>`
  ).join('');

  tagsEl.querySelectorAll('.pill').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const dim = btn.dataset.dim, tag = btn.dataset.tag;
      clearAll();
      active[dim].add(tag);
      const src = document.querySelector(`.chip[data-dim="${dim}"][data-tag="${CSS.escape(tag)}"]`);
      if(src) src.classList.add('active');
      closeModal(true);
      applyFilters();
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });

  modal.classList.add('open'); backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  renderPager(s);
  if(!preserveFocus) setTimeout(()=>closeBtn.focus(), 40);
}

/* Build the bottom thumbnail strip + arrow disabled state. */
function renderPager(currentS){
  const list = navigableStyles();
  const onlyOne = list.length <= 1;
  navPrevBtn.toggleAttribute('disabled', onlyOne);
  navNextBtn.toggleAttribute('disabled', onlyOne);

  // Reuse existing thumbs if the list is unchanged; else rebuild.
  const sig = list.map(s=>s.num).join(',');
  if(pagerThumbsEl.dataset.sig !== sig){
    pagerThumbsEl.dataset.sig = sig;
    pagerThumbsEl.innerHTML = list.map(s=>{
      const thumb = (s.tiles && s.tiles[0]) || '';
      const url = thumb ? encodeURI(thumb) : '';
      return `<button class="pager-thumb" role="tab" data-num="${s.num}" aria-label="Open ${s.name}" style="${url?`background-image:url('${url}')`:''}"></button>`;
    }).join('');
    pagerThumbsEl.querySelectorAll('.pager-thumb').forEach(t=>{
      t.addEventListener('click', ()=>{
        const num = Number(t.dataset.num);
        const target = STYLES.find(x=>x.num===num);
        if(target && target.num !== currentStyle.num) openStyle(target, true);
      });
    });
  }

  // Highlight current + scroll into view (centered).
  const thumbs = pagerThumbsEl.querySelectorAll('.pager-thumb');
  thumbs.forEach(t=>{
    const isCur = Number(t.dataset.num)===currentS.num;
    t.classList.toggle('current', isCur);
    t.setAttribute('aria-selected', String(isCur));
    if(isCur){
      const rectT = t.getBoundingClientRect();
      const rectP = pagerThumbsEl.getBoundingClientRect();
      pagerThumbsEl.scrollBy({left: (rectT.left + rectT.width/2) - (rectP.left + rectP.width/2), behavior: 'smooth'});
    }
  });
}
function escapeAttr(s){ return s.replace(/"/g,'&quot;'); }

function tagsForStyle(s){
  const curated = CURATED_DIMS.map(dim=>({dim, label:LABELS[dim], tags: s.tags[dim]||[]}));
  const token = [
    {dim:'core_terms', label: TDIMS.core_terms.label, tags: s.terms_core||[]},
    {dim:'feels',      label: 'Feels',                tags: s.terms_feels||[]},
    {dim:'fits',       label: 'Fits',                 tags: s.terms_fits||[]},
  ];
  return [...curated, ...token];
}

function closeModal(silent){
  modal.classList.remove('open'); backdrop.classList.remove('open');
  document.body.style.overflow = '';
  if(lastFocus && !silent) lastFocus.focus();
}
closeBtn.addEventListener('click', ()=>closeModal());
backdrop.addEventListener('click', ()=>closeModal());
navPrevBtn.addEventListener('click', ()=>navigateModal(-1));
navNextBtn.addEventListener('click', ()=>navigateModal(+1));
window.addEventListener('keydown',e=>{
  if(!modal.classList.contains('open')) return;
  if(e.key==='Escape')        closeModal();
  else if(e.key==='ArrowLeft')  { e.preventDefault(); navigateModal(-1); }
  else if(e.key==='ArrowRight') { e.preventDefault(); navigateModal(+1); }
});

/* Keyboard shortcut: "/" focuses search */
window.addEventListener('keydown',e=>{
  if(e.key==='/' && !modal.classList.contains('open') && document.activeElement.tagName!=='INPUT'){
    e.preventDefault(); searchEl.focus();
  }
});

applyFilters();
</script>
</body>
</html>
